<!DOCTYPE html>
<html>
<head>
    <title>CSS Styling Methods Comparison</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        .internal-style {
            color: white;
            background-color: blue;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>CSS Styling Methods Comparison</h1>

    <!-- Inline CSS -->
    <p style="color: white; background-color: red; padding: 10px; border-radius: 5px;">
        This is Inline CSS
    </p>

    <!-- Internal CSS -->
    <p class="internal-style">
        This is Internal CSS
    </p>

    <!-- External CSS -->
    <p class="external-style">
        This is External CSS
    </p>

</body>
</html>
