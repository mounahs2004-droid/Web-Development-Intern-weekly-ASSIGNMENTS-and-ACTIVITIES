<h2>Comparison Table</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Method</th>
        <th>Pros</th>
        <th>Cons</th>
    </tr>
    <tr>
        <td>Inline CSS</td>
        <td>Quick and easy for small changes</td>
        <td>Not reusable, messy for large projects</td>
    </tr>
    <tr>
        <td>Internal CSS</td>
        <td>Good for single page styling</td>
        <td>Not reusable across multiple pages</td>
    </tr>
    <tr>
        <td>External CSS</td>
        <td>Reusable, clean, best for large projects</td>
        <td>Needs separate file</td>
    </tr>
</table>
